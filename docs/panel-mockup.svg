<svg xmlns="http://www.w3.org/2000/svg" width="900" height="472" viewBox="0 0 900 472" font-family="Roboto, -apple-system, 'Segoe UI', sans-serif">
  <rect width="900" height="472" fill="#f4f5f7"/>

  <!-- header -->
  <g transform="translate(20,20)">
    <rect x="0" y="6" width="20" height="2.5" rx="1.25" fill="#5a5a5a"/>
    <rect x="0" y="12" width="20" height="2.5" rx="1.25" fill="#5a5a5a"/>
    <rect x="0" y="18" width="20" height="2.5" rx="1.25" fill="#5a5a5a"/>
    <rect x="34" y="2" width="20" height="20" rx="5" fill="#03a9f4"/>
    <text x="64" y="18" font-size="18" font-weight="500" fill="#1a1a1a">Warden</text>
    <rect x="642" y="1" width="132" height="26" rx="8" fill="#fff" stroke="#d7d7d7"/>
    <text x="708" y="18" font-size="12.5" fill="#1a1a1a" text-anchor="middle">Verify integrity</text>
    <rect x="784" y="1" width="76" height="26" rx="8" fill="#fff" stroke="#d7d7d7"/>
    <text x="822" y="18" font-size="12.5" fill="#1a1a1a" text-anchor="middle">Refresh</text>
  </g>

  <!-- stat tiles -->
  <g transform="translate(20,60)">
    <g>
      <rect x="0" y="0" width="206" height="72" rx="12" fill="#fff" stroke="#e6e6e6"/>
      <text x="16" y="38" font-size="26" font-weight="600" fill="#1a1a1a">2</text>
      <text x="16" y="58" font-size="12.5" fill="#777">Failed auth · 24h</text>
    </g>
    <g transform="translate(218,0)">
      <rect x="0" y="0" width="206" height="72" rx="12" fill="#fff" stroke="#e6e6e6"/>
      <text x="16" y="38" font-size="26" font-weight="600" fill="#1a1a1a">1</text>
      <text x="16" y="58" font-size="12.5" fill="#777">Anomalies · 24h</text>
    </g>
    <g transform="translate(436,0)">
      <rect x="0" y="0" width="206" height="72" rx="12" fill="#fff" stroke="#e6e6e6"/>
      <text x="16" y="38" font-size="26" font-weight="600" fill="#1a1a1a">1,204</text>
      <text x="16" y="58" font-size="12.5" fill="#777">User actions · 24h</text>
    </g>
    <g transform="translate(654,0)">
      <rect x="0" y="0" width="206" height="72" rx="12" fill="#fff" stroke="#e6e6e6"/>
      <text x="16" y="38" font-size="26" font-weight="600" fill="#1a1a1a">12.4 MB</text>
      <text x="16" y="58" font-size="12.5" fill="#777">DB size · 48,190 rows</text>
    </g>
  </g>

  <!-- filter bar -->
  <g transform="translate(20,150)" font-size="12.5" fill="#8a8a8a">
    <rect x="0" y="0" width="150" height="30" rx="8" fill="#fff" stroke="#d7d7d7"/>
    <text x="12" y="19">all categories ▾</text>
    <rect x="160" y="0" width="210" height="30" rx="8" fill="#fff" stroke="#d7d7d7"/>
    <text x="172" y="19">search entity / type…</text>
    <rect x="380" y="0" width="120" height="30" rx="8" fill="#fff" stroke="#d7d7d7"/>
    <text x="392" y="19">user id</text>
    <rect x="510" y="0" width="130" height="30" rx="8" fill="#fff" stroke="#d7d7d7"/>
    <text x="522" y="19">any outcome ▾</text>
    <rect x="650" y="0" width="66" height="30" rx="8" fill="#fff" stroke="#d7d7d7"/>
    <text x="683" y="19" fill="#1a1a1a" text-anchor="middle">Filter</text>
    <rect x="724" y="0" width="60" height="30" rx="8" fill="#fff" stroke="#d7d7d7"/>
    <text x="754" y="19" fill="#1a1a1a" text-anchor="middle">Clear</text>
  </g>

  <!-- table -->
  <g transform="translate(20,196)">
    <rect x="0" y="0" width="860" height="252" rx="12" fill="#fff" stroke="#e6e6e6"/>
    <!-- header -->
    <g font-size="12" fill="#888">
      <text x="16" y="26">Time</text>
      <text x="134" y="26">Category</text>
      <text x="284" y="26">Action</text>
      <text x="474" y="26">Target</text>
      <text x="672" y="26">User</text>
      <text x="792" y="26">Outcome</text>
    </g>
    <line x1="0" y1="38" x2="860" y2="38" stroke="#eee"/>

    <!-- rows -->
    <g font-size="12.5" fill="#1a1a1a">
      <!-- r1 auth -->
      <g transform="translate(0,38)">
        <text x="16" y="24" fill="#444" font-family="monospace">08:14:02</text>
        <circle cx="138" cy="20" r="4" fill="#db4437"/><text x="150" y="24">auth_attempt</text>
        <text x="284" y="24" font-family="monospace">http_auth_failed</text>
        <text x="474" y="24" font-family="monospace">192.168.1.240</text>
        <text x="672" y="24" fill="#999">—</text>
        <text x="792" y="24" fill="#db4437">failure</text>
        <line x1="0" y1="34" x2="860" y2="34" stroke="#f0f0f0"/>
      </g>
      <!-- r2 device -->
      <g transform="translate(0,72)">
        <text x="16" y="24" fill="#444" font-family="monospace">08:13:55</text>
        <circle cx="138" cy="20" r="4" fill="#039be5"/><text x="150" y="24">device_state</text>
        <text x="284" y="24" font-family="monospace">→ unlocked</text>
        <text x="474" y="24" font-family="monospace">lock.front_door</text>
        <text x="672" y="24">john</text>
        <text x="792" y="24" fill="#999">—</text>
        <line x1="0" y1="34" x2="860" y2="34" stroke="#f0f0f0"/>
      </g>
      <!-- r3 user_action -->
      <g transform="translate(0,106)">
        <text x="16" y="24" fill="#444" font-family="monospace">08:13:40</text>
        <circle cx="138" cy="20" r="4" fill="#03a9f4"/><text x="150" y="24">user_action</text>
        <text x="284" y="24" font-family="monospace">light.turn_on</text>
        <text x="474" y="24" font-family="monospace">light.kitchen</text>
        <text x="672" y="24">john</text>
        <text x="792" y="24" fill="#999">—</text>
        <line x1="0" y1="34" x2="860" y2="34" stroke="#f0f0f0"/>
      </g>
      <!-- r4 user_action -->
      <g transform="translate(0,140)">
        <text x="16" y="24" fill="#444" font-family="monospace">08:12:10</text>
        <circle cx="138" cy="20" r="4" fill="#03a9f4"/><text x="150" y="24">user_action</text>
        <text x="284" y="24" font-family="monospace">climate.set_temperature</text>
        <text x="474" y="24" font-family="monospace">climate.lounge</text>
        <text x="672" y="24">jane</text>
        <text x="792" y="24" fill="#999">—</text>
        <line x1="0" y1="34" x2="860" y2="34" stroke="#f0f0f0"/>
      </g>
      <!-- r5 anomaly -->
      <g transform="translate(0,174)">
        <text x="16" y="24" fill="#444" font-family="monospace">08:10:11</text>
        <circle cx="138" cy="20" r="4" fill="#ffa600"/><text x="150" y="24">anomaly</text>
        <text x="284" y="24" font-family="monospace">anomalous_frequency</text>
        <text x="474" y="24" font-family="monospace">binary_sensor.garage</text>
        <text x="672" y="24" fill="#999">—</text>
        <text x="792" y="24" fill="#999">—</text>
        <line x1="0" y1="34" x2="860" y2="34" stroke="#f0f0f0"/>
      </g>
      <!-- r6 device -->
      <g transform="translate(0,208)">
        <text x="16" y="24" fill="#444" font-family="monospace">08:05:02</text>
        <circle cx="138" cy="20" r="4" fill="#039be5"/><text x="150" y="24">device_state</text>
        <text x="284" y="24" font-family="monospace">→ open</text>
        <text x="474" y="24" font-family="monospace">binary_sensor.back_door</text>
        <text x="672" y="24" fill="#999">—</text>
        <text x="792" y="24" fill="#999">—</text>
      </g>
    </g>
  </g>
</svg>
